  {id:32,text:'กินแคลลอรี่ต่อวันไม่เกิน 2200 แคล',cat:'food'},

const CATS = {
  food:  {label:'🥗 โภชนาการ',      bg:'var(--cat-food-bg)',   color:'var(--cat-food)'},
  sleep: {label:'😴 การนอนหลับ',    bg:'var(--cat-sleep-bg)',  color:'var(--cat-sleep)'},
  move:  {label:'🏃 การเคลื่อนไหว', bg:'var(--cat-move-bg)',   color:'var(--cat-move)'},
  mind:  {label:'🧠 จิตใจ & สมาธิ', bg:'var(--cat-mind-bg)',   color:'var(--cat-mind)'},
  social:{label:'🤝 สังคม',          bg:'var(--cat-social-bg)', color:'var(--cat-social)'},
};
const THAI_MONTHS    = ['มกราคม','กุมภาพันธ์','มีนาคม','เมษายน','พฤษภาคม','มิถุนายน','กรกฎาคม','สิงหาคม','กันยายน','ตุลาคม','พฤศจิกายน','ธันวาคม'];
const THAI_DAYS_S    = ['อา','จ','อ','พ','พฤ','ศ','ส'];
const THAI_DAYS_L    = ['อาทิตย์','จันทร์','อังคาร','พุธ','พฤหัสบดี','ศุกร์','เสาร์'];

const TODAY = new Date();

// Load Init State from localStorage to keep state after F5
const cachedView = localStorage.getItem('dh_view') || 'single';
const cachedDay = localStorage.getItem('dh_day') ? parseInt(localStorage.getItem('dh_day')) : TODAY.getDate();
const cachedMonth = localStorage.getItem('dh_month') ? parseInt(localStorage.getItem('dh_month')) : TODAY.getMonth();
const cachedYear = localStorage.getItem('dh_year') ? parseInt(localStorage.getItem('dh_year')) : TODAY.getFullYear();
const cachedPerson = localStorage.getItem('dh_person') || 'p';

let state = { 
  year: cachedYear, 
  month: cachedMonth, 
  day: cachedDay, 
  person: cachedPerson, 
  view: cachedView, 
  cache: {}, 
  personNames: {p:'ปังปอนด์', n:'ช่องว่าง'}, 
  showInputs: {p: false, n: false},
  scheduleData: {p: {}, n: {}}
};

/* ── FIREBASE ─────────────────────────────────────── */
function dayPath(y,m,d,who){ return `habits/${y}_${String(m+1).padStart(2,'0')}_${String(d).padStart(2,'0')}/${who}`; }
function notePath(y,m,d,who,id){ return `notes/${y}_${String(m+1).padStart(2,'0')}_${String(d).padStart(2,'0')}/${who}/${id}`; }
function dailyNotePath(y,m,d){ return `daily_notes/${y}_${String(m+1).padStart(2,'0')}_${String(d).padStart(2,'0')}`; }
function personNamePath(who){ return `settings/person_names/${who}`; }
function cKey(y,m,d,who){ return `${y}_${m}_${d}_${who}`; }
function nKey(y,m,d,who,id){ return `n_${y}_${m}_${d}_${who}_${id}`; }
function dnKey(y,m,d){ return `dn_${y}_${m}_${d}`; }

function setSyncStatus(s){
  const dot=document.getElementById('sync-dot'), txt=document.getElementById('sync-text');
  if(!dot || !txt) return;
  if(s==='online'){dot.className='sync-dot online';txt.textContent='ซิงค์แล้ว'}
  if(s==='syncing'){dot.className='sync-dot syncing';txt.textContent='กำลังบันทึก...'}
  if(s==='offline'){dot.className='sync-dot';txt.textContent='ออฟไลน์'}
}

let activeSubs = [];
function unsubAll(){ activeSubs.forEach(u=>u&&u()); activeSubs=[]; }

function subscribeMonth(y, m){
  unsubAll();
  const total = new Date(y,m+1,0).getDate();
  for(let d=1;d<=total;d++){
    ['p','n'].forEach(who=>{
      const r = ref(db, dayPath(y,m,d,who));
      const unsub = onValue(r, snap=>{
        const val=snap.val();
        state.cache[cKey(y,m,d,who)] = val ? Object.keys(val).map(Number) : [];
        renderAll();
      }, _=>setSyncStatus('offline'));
      activeSubs.push(unsub);
    });
  }
}

async function toggle(y,m,d,who,id){
  setSyncStatus('syncing');
  const k=cKey(y,m,d,who);
  const cur=[...(state.cache[k]||[])];
  const idx=cur.indexOf(id);
  if(idx>=0) cur.splice(idx,1); else cur.push(id);
  state.cache[k]=cur;
  renderAll();
  const obj={}; cur.forEach(i=>{obj[i]=true;});
  try{ await set(ref(db,dayPath(y,m,d,who)), Object.keys(obj).length?obj:null); setSyncStatus('online'); }
  catch(e){ setSyncStatus('offline'); }
}
window.toggle=toggle;

// ── NOTES ────────────────────────────────────────────
let noteUnsubs=[];
function unsubNotes(){ noteUnsubs.forEach(u=>u&&u()); noteUnsubs=[]; }

function subscribeNotes(y, m, d, who) {
  unsubNotes();
  HABITS.forEach(h => {
    const r = ref(db, notePath(y, m, d, who, h.id));
    const unsub = onValue(r, snap => {
      state.cache[nKey(y, m, d, who, h.id)] = snap.val() || "";
      const el = document.getElementById(`nt-${h.id}`);
      if (el && document.activeElement !== el) {
        el.value = snap.val() || "";
      }
      updateNoteBtnState(h.id);
    });
    noteUnsubs.push(unsub);
  });

  const dnRef = ref(db, dailyNotePath(y, m, d));
  const dnUnsub = onValue(dnRef, snap => {
    const val = snap.val() || {};
    state.cache[dnKey(y, m, d)] = val;
    const textarea = document.getElementById("daily-note-textarea");
    if (textarea && document.activeElement !== textarea) {
      textarea.value = val[state.person] || "";
    }
    updateDailyNoteMeta(val);
  });
  noteUnsubs.push(dnUnsub);
}

// ── UI RENDERERS ─────────────────────────────────────
function renderAll() {
  if (state.view === 'single') renderSingleView();
  if (state.view === 'compare') renderCompareView();
  if (state.view === 'summary') renderSummaryView();
  if (state.view === 'schedule') renderScheduleView();
  renderCalendar();
  updateSidebarStats();
}

function renderSingleView() {
  const container = document.getElementById("habits-container");
  if (!container) return;

  const doneList = state.cache[cKey(state.year, state.month, state.day, state.person)] || [];
  const groups = {};
  HABITS.forEach(h => { if (!groups[h.cat]) groups[h.cat] = []; groups[h.cat].push(h); });

  let html = "";
  Object.keys(CATS).forEach(catKey => {
    if (!groups[catKey]) return;
    const cat = CATS[catKey];
    html += `<div class="cat-block">
      <div class="cat-label" style="background:${cat.bg}; color:${cat.color}">${cat.label}</div>`;
    
    groups[catKey].forEach(h => {
      const isDone = doneList.includes(h.id);
      const doneClass = isDone ? `done-${state.person}` : "";
      const chkClass = isDone ? `chk-${state.person}` : "";
      const noteVal = state.cache[nKey(state.year, state.month, state.day, state.person, h.id)] || "";
      const hasNoteClass = noteVal ? "has-note" : "";
      const bgClass = `bg-${state.person}`;

      html += `
        <div class="habit-wrap" id="wrap-${h.id}">
          <div class="habit ${doneClass}" onclick="toggle(${state.year},${state.month},${state.day},'${state.person}',${h.id})">
            <div class="chk ${chkClass}">${isDone ? '✓' : ''}</div>
            <div class="habit-text">${h.text}</div>
            <button class="note-btn ${hasNoteClass}" id="nbtn-${h.id}" onclick="event.stopPropagation(); toggleNoteArea(${h.id})">📝</button>
          </div>
          <div class="note-area ${bgClass}">
            <textarea class="note-textarea" id="nt-${h.id}" placeholder="บันทึกเพิ่มเติมสำหรับข้อนี้..." oninput="saveNote(${h.id}, this.value)"></textarea>
            <div class="note-saved" id="nsaved-${h.id}"></div>
          </div>
        </div>`;
    });
    html += `</div>`;
  });
  container.innerHTML = html;
}

function renderCompareView() {
  ['p', 'n'].forEach(who => {
    const listEl = document.getElementById(`cmp-list-${who}`);
    const scoreEl = document.getElementById(`cmp-score-${who}`);
    const barEl = document.getElementById(`cmp-bar-${who}`);
    if (!listEl) return;

    const doneList = state.cache[cKey(state.year, state.month, state.day, who)] || [];
    scoreEl.textContent = `${doneList.length} / ${HABITS.length}`;
    const pct = HABITS.length ? Math.round((doneList.length / HABITS.length) * 100) : 0;
    barEl.style.width = `${pct}%`;

    listEl.innerHTML = HABITS.map(h => {
      const isDone = doneList.includes(h.id);
      return `
        <div class="cmp-item ${isDone ? 'done-' + who : ''}" onclick="toggle(${state.year},${state.month},${state.day},'${who}',${h.id})">
          <div class="cmp-chk ${isDone ? 'chk-' + who : ''}">${isDone ? '✓' : ''}</div>
          <div class="cmp-text">${h.text}</div>
        </div>`;
    }).join('');
  });
}

function renderSummaryView() {
  const daysInMonth = new Date(state.year, state.month + 1, 0).getDate();
  const tbody = document.getElementById("day-tbody");
  const chartWrap = document.getElementById("chart-svg-wrap");
  if (!tbody || !chartWrap) return;

  document.getElementById("sum-title").textContent = `สรุปผลเดือน ${THAI_MONTHS[state.month]} ${state.year + 543}`;

  let tableHtml = "";
  let svgBars = "";
  let pTotalPct = 0, nTotalPct = 0, daysWithData = 0;
  let pWins = 0, nWins = 0, ties = 0;

  const barWidth = 16;
  const gap = 12;
  const svgWidth = Math.max(600, daysInMonth * (barWidth * 2 + gap) + 40);

  for (let d = 1; d <= daysInMonth; d++) {
    const pDone = state.cache[cKey(state.year, state.month, d, 'p')] || [];
    const nDone = state.cache[cKey(state.year, state.month, d, 'n')] || [];
    
    const pPct = Math.round((pDone.length / HABITS.length) * 100);
    const nPct = Math.round((nDone.length / HABITS.length) * 100);
    
    const hasData = pDone.length > 0 || nDone.length > 0;
    if (hasData) {
      pTotalPct += pPct; nTotalPct += nPct; daysWithData++;
    }

    let winBadge = `<span class="winner-badge win-tie">เสมอ</span>`;
    if (pPct > nPct) { winBadge = `<span class="winner-badge win-p">ปังปอนด์</span>`; pWins++; }
    else if (nPct > pPct) { winBadge = `<span class="winner-badge win-n">${state.personNames.n}</span>`; nWins++; }
    else if (pPct === nPct && hasData) { ties++; }

    const isToday = state.year === TODAY.getFullYear() && state.month === TODAY.getMonth() && d === TODAY.getDate();
    const dateObj = new Date(state.year, state.month, d);
    
    tableHtml += `
      <tr class="${isToday ? 'is-today' : ''}" onclick="selectDate(${d})">
        <td class="day-num">${d}</td>
        <td class="day-dow">${THAI_DAYS_L[dateObj.getDay()]}</td>
        <td>
          <div class="bar-cell">
            <span class="pct-pill col-p">${pPct}%</span>
            <div class="mini-bar-wrap"><div class="mini-bar mini-bar-p" style="width:${pPct}%"></div></div>
          </div>
        </td>
        <td>
          <div class="bar-cell">
            <span class="pct-pill col-n">${nPct}%</span>
            <div class="mini-bar-wrap"><div class="mini-bar mini-bar-n" style="width:${nPct}%"></div></div>
          </div>
        </td>
        <td>${hasData ? winBadge : '-'}</td>
      </tr>`;

    const xBase = 30 + (d - 1) * (barWidth * 2 + gap);
    const pHeight = pPct * 1.5;
    const nHeight = nPct * 1.5;
    svgBars += `
      <rect x="${xBase}" y="${160 - pHeight}" width="${barWidth}" height="${pHeight}" fill="var(--pp)" rx="2" />
      <rect x="${xBase + barWidth + 2}" y="${160 - nHeight}" width="${barWidth}" height="${nHeight}" fill="var(--nn)" rx="2" />
      <text x="${xBase + barWidth}" y="175" font-size="10" fill="var(--text-3)" text-anchor="middle">${d}</text>
    `;
  }

  tbody.innerHTML = tableHtml;

  chartWrap.innerHTML = `
    <svg width="${svgWidth}" height="190" style="display:block; margin:0 auto;">
      <line x1="20" y1="160" x2="${svgWidth - 20}" y2="160" stroke="var(--border-mid)" stroke-width="1"/>
      <line x1="20" y1="85" x2="${svgWidth - 20}" y2="85" stroke="var(--border)" stroke-dasharray="4,4"/>
      <line x1="20" y1="10" x2="${svgWidth - 20}" y2="10" stroke="var(--border)" stroke-dasharray="4,4"/>
      ${svgBars}
    </svg>
  `;

  const pAvg = daysWithData ? Math.round(pTotalPct / daysWithData) : 0;
  const nAvg = daysWithData ? Math.round(nTotalPct / daysWithData) : 0;
  document.getElementById("stat-cards").innerHTML = `
    <div class="stat-card"><div class="stat-card-label">เฉลี่ย ปังปอนด์</div><div class="stat-val col-p">${pAvg}%</div></div>
    <div class="stat-card"><div class="stat-card-label">เฉลี่ย ${state.personNames.n}</div><div class="stat-val col-n">${nAvg}%</div></div>
    <div class="stat-card"><div class="stat-card-label">ชนะ (วัน)</div><div class="stat-val" style="font-size:16px"><span class="pct-p">ป: ${pWins}</span> / <span class="pct-n">น: ${nWins}</span></div></div>
    <div class="stat-card"><div class="stat-card-label">บันทึกแล้ว</div><div class="stat-val">${daysWithData} วัน</div></div>
  `;
}

// ── SCHEDULE SYSTEM WITH DRAG & DROP ─────────────────
let scheduleUnsubs = { p: null, n: null };

function renderScheduleView() {
  ['p', 'n'].forEach(who => {
    if (scheduleUnsubs[who]) { scheduleUnsubs[who](); scheduleUnsubs[who] = null; }
    
    const listEl = document.getElementById(`schedule-list-${who}`);
    if (!listEl) return;

    const r = ref(db, `schedules/${who}`);
    scheduleUnsubs[who] = onValue(r, snap => {
      const val = snap.val() || {};
      state.scheduleData[who] = val;
      
      // Sort elements by 'index' property (assigned on drag) or default by 'time'
      const items = Object.keys(val).map(k => ({ id: k, ...val[k] })).sort((a, b) => {
        if (a.index !== undefined && b.index !== undefined) return a.index - b.index;
        return a.time.localeCompare(b.time);
      });

      let html = "";
      if (state.showInputs[who]) {
        html += `
          <div class="schedule-input-row">
            <input type="text" id="sched-in-time-${who}" class="schedule-time-input" placeholder="07:00" value="07:00">
            <input type="text" id="sched-in-text-${who}" class="schedule-text-input" placeholder="กิจกรรมใหม่...">
            <button class="schedule-save-btn" onclick="saveNewScheduleItem('${who}')">บันทึก</button>
            <button class="schedule-cancel-btn" onclick="toggleScheduleInput('${who}', false)">ยกเลิก</button>
          </div>`;
      }

      if (items.length === 0 && !state.showInputs[who]) {
        html += `<div style="padding:30px; text-align:center; color:var(--text-3); font-size:13px;">ไม่มีรายการในตาราง</div>`;
      } else {
        items.forEach(item => {
          const checkedClass = item.done ? "checked" : "";
          const doneClass = item.done ? "done" : "";
          const chkBorderColor = who === 'p' ? 'var(--pp)' : 'var(--nn)';
          const chkBgColor = item.done ? chkBorderColor : 'transparent';
          
          html += `
            <div class="schedule-item ${doneClass}" 
                 draggable="true" 
                 data-id="${item.id}" 
                 data-who="${who}"
                 ondragstart="handleDragStart(event)" 
                 ondragover="handleDragOver(event)" 
                 onblockdrop="handleDrop(event)"
                 ondragend="handleDragEnd(event)"
                 onclick="toggleScheduleItem('${who}', '${item.id}', ${!item.done})">
              <div class="schedule-checkbox ${checkedClass}" style="border-color: ${chkBorderColor}; background-color: ${chkBgColor}; color: #fff;">${item.done ? '✓' : ''}</div>
              <div class="schedule-time">${item.time}</div>
              <div class="schedule-text">${item.text}</div>
              <div class="schedule-actions">
                <button class="schedule-btn" onclick="event.stopPropagation(); deleteScheduleItem('${who}', '${item.id}')">🗑️</button>
              </div>
            </div>`;
        });
      }
      listEl.innerHTML = html;
      attachDropListeners(listEl);
    });
  });
}

window.toggleScheduleInput = function(who, show) {
  state.showInputs[who] = show;
  renderScheduleView();
};

window.saveNewScheduleItem = async function(who) {
  const time = document.getElementById(`sched-in-time-${who}`).value.trim();
  const text = document.getElementById(`sched-in-text-${who}`).value.trim();
  if (!time || !text) return;
  
  const currentItemsCount = Object.keys(state.scheduleData[who] || {}).length;
  const newRef = ref(db, `schedules/${who}/${Date.now()}`);
  
  setSyncStatus('syncing');
  await set(newRef, { time, text, done: false, index: currentItemsCount });
  setSyncStatus('online');
  
  state.showInputs[who] = false;
  renderScheduleView();
};

window.toggleScheduleItem = async function(who, id, doneState) {
  setSyncStatus('syncing');
  await set(ref(db, `schedules/${who}/${id}/done`), doneState);
  setSyncStatus('online');
};

window.deleteScheduleItem = async function(who, id) {
  if (!confirm("ต้องการลบรายการนี้ใช่หรือไม่?")) return;
  setSyncStatus('syncing');
  await set(ref(db, `schedules/${who}/${id}`), null);
  setSyncStatus('online');
};

// ── HTML5 DRAG AND DROP HANDLERS ─────────────────────
let dragSourceEl = null;

window.handleDragStart = function(e) {
  dragSourceEl = e.currentTarget;
  e.currentTarget.style.opacity = '0.4';
  e.dataTransfer.effectAllowed = 'move';
  e.dataTransfer.setData('text/plain', e.currentTarget.getAttribute('data-id'));
};

window.handleDragOver = function(e) {
  if (e.preventDefault) e.preventDefault();
  return false;
};

window.handleDragEnd = function(e) {
  e.currentTarget.style.opacity = '1';
};

function attachDropListeners(container) {
  container.addEventListener('dragover', (e) => {
    e.preventDefault();
    const afterElement = getDragAfterElement(container, e.clientY);
    const draggingItem = document.querySelector('[draggable="true"][style*="opacity: 0.4"]');
    if (!draggingItem) return;
    
    // Check if dragging within same profile column
    if (draggingItem.getAttribute('data-who') !== container.id.replace('schedule-list-', '')) return;

    if (afterElement == null) {
      container.appendChild(draggingItem);
    } else {
      container.insertBefore(draggingItem, afterElement);
    }
  });

  container.addEventListener('drop', async (e) => {
    e.preventDefault();
    const who = container.id.replace('schedule-list-', '');
    const reorderedNodes = Array.from(container.querySelectorAll('.schedule-item'));
    
    setSyncStatus('syncing');
    for (let i = 0; i < reorderedNodes.length; i++) {
      const id = reorderedNodes[i].getAttribute('data-id');
      if (state.scheduleData[who] && state.scheduleData[who][id]) {
        state.scheduleData[who][id].index = i;
        await set(ref(db, `schedules/${who}/${id}/index`), i);
      }
    }
    setSyncStatus('online');
  });
}

function getDragAfterElement(container, y) {
  const draggableElements = [...container.querySelectorAll('.schedule-item:not([style*="opacity: 0.4"])')];
  return draggableElements.reduce((closest, child) => {
    const box = child.getBoundingClientRect();
    const offset = y - box.top - box.height / 2;
    if (offset < 0 && offset > closest.offset) {
      return { offset: offset, element: child };
    } else {
      return closest;
    }
  }, { offset: Number.NEGATIVE_INFINITY }).element;
}

// ── CALENDAR & SIDEBAR SYSTEM ────────────────────────
function renderCalendar() {
  const grid = document.getElementById("cal-grid");
  const label = document.getElementById("cal-month-label");
  if (!grid || !label) return;

  label.textContent = `${THAI_MONTHS[state.month]} ${state.year + 543}`;
  let html = THAI_DAYS_S.map(d => `<div class="cal-dn">${d}</div>`).join('');

  const firstDay = new Date(state.year, state.month, 1).getDay();
  const totalDays = new Date(state.year, state.month + 1, 0).getDate();

  for (let i = 0; i < firstDay; i++) html += `<div class="cal-d empty"></div>`;

  for (let d = 1; d <= totalDays; d++) {
    const isToday = state.year === TODAY.getFullYear() && state.month === TODAY.getMonth() && d === TODAY.getDate();
    const isSelected = state.year === state.year && state.month === state.month && d === state.day;
    
    const pDone = state.cache[cKey(state.year, state.month, d, 'p')] || [];
    const nDone = state.cache[cKey(state.year, state.month, d, 'n')] || [];

    let dotsHtml = '<div class="dots">';
    if (pDone.length > 0) dotsHtml += '<div class="dot dot-p"></div>';
    if (nDone.length > 0) dotsHtml += '<div class="dot dot-n"></div>';
    dotsHtml += '</div>';

    const cls = `cal-d ${isToday ? 'today' : ''} ${isSelected ? 'selected' : ''}`;
    html += `<div class="${cls}" onclick="selectDate(${d})"><div>${d}</div>${dotsHtml}</div>`;
  }
  grid.innerHTML = html;
}

function updateSidebarStats() {
  ['p', 'n'].forEach(who => {
    const doneList = state.cache[cKey(state.year, state.month, state.day, who)] || [];
    const pct = HABITS.length ? Math.round((doneList.length / HABITS.length) * 100) : 0;
    
    const pctEl = document.getElementById(`pct-${who}`);
    const barEl = document.getElementById(`pbar-${who}`);
    if (pctEl) pctEl.textContent = `${pct}%`;
    if (barEl) barEl.style.width = `${pct}%`;
  });
}

// ── APP LIFECYCLE & EVENTS ───────────────────────────
window.setView = function(v) {
  state.view = v;
  localStorage.setItem('dh_view', v); // Save to LocalStorage
  ['single', 'compare', 'summary', 'schedule'].forEach(t => {
    const tabBtn = document.getElementById(`tab-${t}`);
    const viewDiv = document.getElementById(`view-${t}`);
    if (tabBtn) tabBtn.className = `nav-tab ${t === v ? 'active' : ''}`;
    if (viewDiv) viewDiv.style.display = t === v ? 'block' : 'none';
  });
  renderAll();
};

window.setPerson = function(p) {
  state.person = p;
  localStorage.setItem('dh_person', p); // Save to LocalStorage
  document.getElementById("pc-p").className = `p-card ${p === 'p' ? 'active-p' : ''}`;
  document.getElementById("pc-n").className = `p-card ${p === 'n' ? 'active-n' : ''}`;
  document.getElementById("btn-p").className = `ps-btn ${p === 'p' ? 'active-p' : ''}`;
  document.getElementById("btn-n").className = `ps-btn ${p === 'n' ? 'active-n' : ''}`;
  
  const textarea = document.getElementById("daily-note-textarea");
  const dn = state.cache[dnKey(state.year, state.month, state.day)] || {};
  if (textarea) textarea.value = dn[p] || "";
  
  renderAll();
};

window.selectDate = function(d) {
  state.day = d;
  localStorage.setItem('dh_day', d); // Save to LocalStorage
  const targetDate = new Date(state.year, state.month, d);
  document.getElementById("date-title").textContent = `${d} ${THAI_MONTHS[state.month]} ${state.year + 543}`;
  document.getElementById("date-sub").textContent = THAI_DAYS_L[targetDate.getDay()];
  subscribeNotes(state.year, state.month, d, state.person);
  renderAll();
};

window.changeMonth = function(dir) {
  state.month += dir;
  if (state.month > 11) { state.month = 0; state.year++; }
  if (state.month < 0) { state.month = 11; state.year--; }
  
  localStorage.setItem('dh_month', state.month);
  localStorage.setItem('dh_year', state.year);
  
  subscribeMonth(state.year, state.month);
  renderAll();
};

window.toggleNoteArea = function(id) {
  const wrap = document.getElementById(`wrap-${id}`);
  if (wrap) wrap.classList.toggle("note-open");
};

let noteTimeouts = {};
window.saveNote = function(id, val) {
  const sEl = document.getElementById(`nsaved-${id}`);
  if (sEl) sEl.textContent = "กำลังพิมพ์...";
  clearTimeout(noteTimeouts[id]);
  noteTimeouts[id] = setTimeout(async () => {
    setSyncStatus('syncing');
    await set(ref(db, notePath(state.year, state.month, state.day, state.person, id)), val || null);
    setSyncStatus('online');
    if (sEl) sEl.textContent = val ? "บันทึกแล้ว" : "";
  }, 800);
};

function updateNoteBtnState(id) {
  const btn = document.getElementById(`nbtn-${id}`);
  const val = state.cache[nKey(state.year, state.month, state.day, state.person, id)] || "";
  if (btn) btn.className = `note-btn ${val ? 'has-note' : ''}`;
}

let dailyNoteTimeout = null;
const dailyNoteTextarea = document.getElementById("daily-note-textarea");
if (dailyNoteTextarea) {
  dailyNoteTextarea.addEventListener("input", (e) => {
    const meta = document.getElementById("daily-note-meta");
    if (meta) meta.textContent = "กำลังบันทึก...";
    clearTimeout(dailyNoteTimeout);
    dailyNoteTimeout = setTimeout(async () => {
      setSyncStatus('syncing');
      const curDn = state.cache[dnKey(state.year, state.month, state.day)] || {};
      curDn[state.person] = e.target.value;
      await set(ref(db, dailyNotePath(state.year, state.month, state.day)), curDn);
      setSyncStatus('online');
      updateDailyNoteMeta(curDn);
    }, 800);
  });
}

function updateDailyNoteMeta(dnObj) {
  const meta = document.getElementById("daily-note-meta");
  if (!meta) return;
  const keys = Object.keys(dnObj).filter(k => dnObj[k]);
  if (keys.length === 0) meta.textContent = "";
  else {
    const names = keys.map(k => k === 'p' ? 'ปังปอนด์' : state.personNames.n);
    meta.textContent = `บันทึกแล้วโดย: ${names.join(', ')}`;
  }
}

window.editPersonName = async function(who) {
  const currentName = state.personNames[who] || "ช่องว่าง";
  const newName = prompt(`แก้ไขชื่อของ "${currentName}" :`, currentName);
  if (newName && newName.trim()) {
    setSyncStatus('syncing');
    await set(ref(db, personNamePath(who)), newName.trim());
    setSyncStatus('online');
  }
};

// Global Name Syncing
onValue(ref(db, 'settings/person_names'), snap => {
  const val = snap.val() || {};
  state.personNames.p = val.p || "ปังปอนด์";
  state.personNames.n = val.n || "ช่องว่าง";
  
  const els = {
    'pname-p': state.personNames.p, 'pname-n': state.personNames.n,
    'btn-p-name': state.personNames.p, 'btn-n-name': state.personNames.n,
    'cmp-name-p': state.personNames.p, 'cmp-name-n': state.personNames.n,
    'legend-name-p': state.personNames.p, 'legend-name-n': state.personNames.n,
    'table-name-p': state.personNames.p, 'table-name-n': state.personNames.n,
    'sched-title-p': state.personNames.p, 'sched-title-n': state.personNames.n
  };
  Object.keys(els).forEach(id => {
    const el = document.getElementById(id);
    if (el) el.textContent = els[id];
  });
  renderAll();
});

// INITIALIZATION
(function init() {
  document.getElementById("loading-overlay").style.opacity = '0';
  setTimeout(() => document.getElementById("loading-overlay").style.display = 'none', 300);
  setSyncStatus('online');
  
  // Restore view from cache
  setView(state.view);
  setPerson(state.person);
  selectDate(state.day);
  subscribeMonth(state.year, state.month);
})();
</script>
